<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#11181f" />
    <title>Gerenciador de Dividas</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-left"></div>
    <div class="bg-orb orb-right"></div>

    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Controle financeiro</p>
          <h1>Gerenciador de Dividas</h1>
        </div>
        <div class="topbar-actions">
          <button id="installButton" class="btn-install" type="button" hidden title="Instalar aplicativo">
            📲 Instalar app
          </button>
          <button id="addDebtFloating" class="fab" title="Nova divida" type="button">+</button>
        </div>
      </header>

      <section class="wallet-panel">
        <label for="walletSelect">Carteira de dividas</label>
        <div class="wallet-row">
          <select id="walletSelect"></select>
          <button id="newWalletButton" type="button">Nova carteira</button>
          <button id="shareWalletButton" class="btn-wpp" type="button" title="Compartilhar no WhatsApp">📤 WhatsApp</button>
          <button id="deleteWalletButton" class="btn-delete-wallet danger" type="button" title="Excluir carteira">🗑️ Excluir carteira</button>
        </div>
      </section>

      <section class="summary-grid">
        <article class="summary-card">
          <h2>Total do mes</h2>
          <p id="monthlyTotal">R$ 0,00</p>
        </article>
        <article class="summary-card">
          <h2>Divida restante</h2>
          <p id="remainingTotal">R$ 0,00</p>
        </article>
        <article class="summary-card">
          <h2>Meses para quitar</h2>
          <p id="monthsToFinish">0</p>
        </article>
      </section>

      <section class="list-section">
        <div class="list-header">
          <h2>Parcelamentos</h2>
          <button id="addDebtInline" type="button">+ Nova divida</button>
        </div>
        <div id="debtsList" class="debts-list"></div>
      </section>
    </main>

    <dialog id="walletDialog" class="modal">
      <form id="walletForm" class="form-grid" method="dialog">
        <h3>Nova carteira</h3>
        <label>
          Nome da carteira
          <input id="walletNameInput" name="walletName" type="text" required minlength="2" maxlength="40" />
        </label>
        <div class="form-actions">
          <button type="button" data-close-wallet>Cancelar</button>
          <button type="submit" class="primary">Salvar carteira</button>
        </div>
      </form>
    </dialog>

    <dialog id="debtDialog" class="modal">
      <form id="debtForm" class="form-grid" enctype="multipart/form-data" method="dialog">
        <h3 id="debtFormTitle">Nova divida</h3>
        <input id="debtId" name="debtId" type="hidden" />

        <label>
          Carteira
          <select id="debtWallet" name="walletId" required></select>
        </label>

        <label>
          Descricao
          <input id="debtDescription" name="description" type="text" required maxlength="80" />
        </label>

        <label>
          Valor total (R$)
          <input id="debtAmount" name="totalAmount" type="number" required min="0.01" step="0.01" />
        </label>

        <label>
          Parcelas
          <input id="debtInstallments" name="totalInstallments" type="number" required min="1" step="1" />
        </label>

        <label class="photo-upload-field">
          Foto para icone
          <input id="debtIcon" class="photo-input" name="icon" type="file" accept="image/*" />
          <span class="photo-hint">Selecione uma imagem para representar esta divida.</span>
        </label>

        <div class="form-actions">
          <button type="button" data-close-debt>Cancelar</button>
          <button type="submit" class="primary">Salvar divida</button>
        </div>
      </form>
    </dialog>

    <template id="debtItemTemplate">
      <article class="debt-card">
        <div class="debt-left">
          <img class="debt-icon" alt="Icone da divida" />
          <div>
            <h3 class="debt-title"></h3>
            <p class="debt-meta"></p>
            <p class="debt-total"></p>
          </div>
        </div>

        <div class="debt-right">
          <p class="installment-value"></p>
          <div class="installment-controls">
            <button type="button" class="decrease">-</button>
            <span class="progress-text"></span>
            <button type="button" class="increase">+</button>
          </div>
          <div class="row-actions">
            <button type="button" class="edit">Editar</button>
            <button type="button" class="delete danger">Excluir</button>
          </div>
        </div>
      </article>
    </template>

    <!-- Toast container -->
    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <!-- Confirm dialog temático -->
    <dialog id="confirmDialog" class="modal confirm-modal">
      <div class="confirm-box">
        <p id="confirmMessage" class="confirm-msg"></p>
        <div class="form-actions">
          <button id="confirmCancel" type="button">Cancelar</button>
          <button id="confirmOk" type="button" class="primary confirm-ok">Confirmar</button>
        </div>
      </div>
    </dialog>

    <!-- Log de atividades -->
    <section class="log-section" id="logSection">
      <button class="log-toggle" id="logToggle" type="button">
        <span>📋 Log de atividades</span>
        <span id="logChevron" class="log-chevron">▲</span>
      </button>
      <div class="log-body" id="logBody">
        <div class="log-header-row">
          <span id="logCount" class="log-count"></span>
          <button id="logClear" type="button" class="log-clear">🗑️ Limpar log</button>
        </div>
        <ul id="logList" class="log-list"></ul>
      </div>
    </section>

    <script src="/app.js" defer></script>
  </body>
</html>
